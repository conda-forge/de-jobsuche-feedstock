schema_version: 1

context:
  name: de-jobsuche
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/de-jobsuche-${{ version }}.tar.gz
  sha256: 418074219cbcb3a29c0e60990aa783d3661e430c886480161edab26d114e9366

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - poetry
  run:
    - python >=${{ python_min }}
    - python-dateutil
    - urllib3 >=1.25.3

tests:
  - python:
      imports:
        - deutschland.jobsuche
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Arbeitsagentur Jobsuche API
  license: Apache-2.0
  license_file:
    - LICENSE
  homepage: https://github.com/bundesAPI/jobsuche-api

extra:
  recipe-maintainers:
    - jan-janssen
